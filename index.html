<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D OMap Viewer</title>

  <!--
    ========================================================
    MapLibre GL JS の読み込み
    WebGL を使ってブラウザ上でインタラクティブな地図を描画するライブラリです。
    3D地形表示（Terrain）や画像オーバーレイなどの機能を持ちます。
    ========================================================
  -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!--
    ========================================================
    PMTiles の読み込み（将来用）
    PMTiles は大量のタイルを1つのファイルにまとめてCloudflare R2などに置き、
    HTTP Range Request で必要部分だけを取得できる次世代フォーマットです。
    将来的に自前のOMAPデータをPMTilesで配信する際に使います。
    ========================================================
  -->
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>

  <!--
    ========================================================
    JSZip の読み込み
    KMZファイルは実態が ZIP 形式の圧縮ファイルです。
    JSZip を使うことで、ブラウザ（JavaScript）上で ZIP を解凍し、
    中に入っている KML ファイルや画像ファイルを取り出すことができます。
    サーバーへのアップロードは不要で、すべてクライアント側で完結します。
    ========================================================
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!--
    ========================================================
    OriLibre（isomizer）が必要とする依存ライブラリ
    mlcontour : DEMタイルから等高線を生成するライブラリ（isomizer内部で使用）
    js-yaml   : isomizerがYAMLプロジェクト設定ファイルを読み込むために使用
    ========================================================
  -->
  <script
    src="https://cdn.jsdelivr.net/gh/qchizu/maplibre-contour-adding-Numerical-PNG-Tile@main/dist/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <style>
    /*
      ========================================================
      全画面表示のスタイル設定
      ========================================================
    */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ---- UIパネル（地理院地図/Q地図スタイル） ---- */
    #ui-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: #fff;
      border: 1px solid #c8c8c8;
      border-radius: 4px;
      padding: 0;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      font-size: 12px;
      min-width: 220px;
      max-width: 260px;
      color: #333;
      overflow: hidden;
    }

    #ui-panel-header {
      background: #4a7c59;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    #ui-panel-header span {
      font-size: 11px;
      opacity: 1.05;
    }

    #ui-panel-body {
      padding: 0;
    }

    /* セクションヘッダ */
    .sec-header {
      background: #f0f0f0;
      border-top: 1px solid #d8d8d8;
      border-bottom: 1px solid #d8d8d8;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      letter-spacing: 0.02em;
    }

    /* レイヤー行 */
    .layer-row {
      padding: 5px 10px 4px;
      border-bottom: 1px solid #ebebeb;
    }

    .layer-row:last-child {
      border-bottom: none;
    }

    /* チェックボックス + ラベル行 */
    .layer-label-row {
      display: flex;
      align-items: center;
      gap: 5px;

    }

    .layer-label-row input[type="checkbox"] {

      accent-color: #4a7c59;
      flex-shrink: 0;

    .layer-name {
      flex: 1;
      font-size: 12px;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      user-select: none;

    .layer-name.disabled {
      color: #aaa;
    }

    .kmz-del-btn {
      flex-shrink: 0;
      background: none;

      color: #aaa;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }

    .kmz-del-btn:hover {
      color: #c0392b;
    }

    /* 透明度スライダー行 */
    .opacity-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 18px;
    }

    .opacity-row input[type="range"] {
      flex: 1;
      height: 3px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: linear-gradient(to right, #4a7c59 var(--pct, 60%), #d0d0d0 var(--pct, 60%));
      outline: none;
    }

    .opacity-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;

      border-color: #4a7c59;

      text-align: right;
      font-size: 11px;
      color: #666;
      font-variant-numeric: tabular-nums;
    }

    /* KMZアップロードボタン */

      margin: 6px 10px;
      padding: 5px 10px;
      background: #fff;
      color: #4a7c59;
      border: 1px solid #4a7c59;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }

    #kmz-upload-btn:hover {
      background: #4a7c59;
      color: #fff;
    }

    /* 地形誇張スライダー行 */
    .terrain-row {
      padding: 5px 10px 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .terrain-label {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .terrain-row input[type="range"] {
      flex: 1;
      height: 3px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: linear-gradient(to right, #6a8fa0 var(--pct, 20%), #d0d0d0 var(--pct, 20%));
      outline: none;
    }

    .terrain-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid #888;
      cursor: pointer;
    }

    .terrain-row input[type="range"]::-webkit-slider-thumb:hover {
      border-color: #6a8fa0;
    }

    /* ドラッグ＆ドロップ用オーバーレイ */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(74, 124, 89, 0.12);
      border: 4px dashed #4a7c59;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: #4a7c59;
      pointer-events: none;
    }

    #drop-overlay.visible {
      display: flex;
    }

    /* 操作ヒント */
    #hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* 等高線間隔セレクト */
    .contour-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
    }

    .contour-row label {
      font-size: 11px;
      color: #b8cfb8;
      white-space: nowrap;
    }

    #sel-contour-interval {
      flex: 1;
      background: #f0f0f0;
      color: #1a1a1a;
      border: 1px solid #b0b8b0;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    #sel-contour-interval:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* 縮尺表示 */
    .scale-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 2px;
    }

    .scale-prefix {
      font-size: 13px;
      font-weight: bold;
      color: #e8f0e8;
      white-space: nowrap;
    }

    #scale-display {
      font-size: 14px;
      font-weight: bold;
      color: #b8e8b8;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    #sel-scale {
      flex: 1;
      background: #f0f0f0;
      color: #1a1a1a;
      border: 1px solid #b0b8b0;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 11px;
      cursor: pointer;
      outline: none;
    }

    /* 現在位置ボタン（MapLibre GeolocateControl）のカスタムスタイル */
    .maplibregl-ctrl-geolocate {
      background-size: 70% !important;
    }

<body>
  <!-- 地図を描画するコンテナ要素 -->
    <div id="map"></div>
    <!-- UIパネル（地理院地図スタイル） -->
      <div id="ui-panel">
        <div id="ui-panel-header">3D OMap Viewer <span id="panel-toggle-icon">▲</span></div>
        <div id="ui-panel-body">
          <!-- OMAP / KMZ（最上層） -->
            <div class="sec-header">OMAP / KMZ</div>
            <div id="kmz-list"></div><input type="file" id="kmz-file-input" accept=".kmz" multiple
              style="display:none" /><button id="kmz-upload-btn">＋ KMZファイルを追加</button>
            <!-- CS立体図セクション（全国5m+都道府県別を並列配置） -->
              <div class="sec-header">CS立体図</div>
              <!-- 全国CS（5mDEM） -->
                <div class="layer-row" id="row-cs">
                  <div class="layer-label-row"><input type="checkbox" id="chk-cs" checked /><label class="layer-name"
                      for="chk-cs">CS立体図（5m）―全国</label></div>

                </div>
                <!-- 都道府県別CS（0.5m）― JSにより動的生成 -->
                  <div id="regional-cs-list"></div>
                  <!-- 等高線 -->
                    <div class="sec-header">等高線</div>
                    <div class="layer-row" id="row-contour">
                      <div class="layer-label-row"><input type="checkbox" id="chk-contour" checked /><label
                          class="layer-name" for="chk-contour">等高線を表示</label></div>
                      <div class="contour-row"><label for="sel-contour-interval">間隔：</label><select
                          id="sel-contour-interval">
                          <option value="1">1 m</option>
                          <option value="2">2 m</option>
                          <option value="2.5">2.5 m</option>

                        </select></div>
                    </div>
                    <!-- 色別標高図 -->
                      <div class="sec-header">色別標高図</div>
                      <div class="layer-row" id="row-elev">
                        <div class="layer-label-row"><input type="checkbox" id="chk-elev" /><label
                            class="layer-name disabled" for="chk-elev">色別標高図</label></div>
                        <div class="opacity-row"><input type="range" id="slider-elev" min="0" max="1" step="0.05"

                      </div>
                      <!-- 地形設定 -->
                        <div class="sec-header">地形設定</div>
                        <div class="terrain-row"><span class="terrain-label">地形誇張</span><input type="range"
                            id="slider-exaggeration" min="0.5" max="3" step="0.1" value="1.0" /><span
                            class="opacity-val" id="val-exaggeration">1.0×</span></div>
                        <!-- 縮尺 -->
                          <div class="sec-header">縮尺</div>

                              id="scale-display">---</span></div>
                          <div class="scale-row"><select id="sel-scale">
                              <option value="">↓ 縮尺を選んで移動</option>
                              <option value="2500">1:2,500</option>
                              <option value="4000">1:4,000</option>
                              <option value="5000">1:5,000</option>
                              <option value="10000">1:10,000</option>
                              <option value="15000">1:15,000</option>
                            </select></div>
        </div>
      </div>
      <!-- ドラッグ&ドロップ時に表示されるオーバーレイ -->
        <div id="drop-overlay">KMZファイルをドロップ</div>
        <!-- 操作ヒント表示 -->
          <div id="hint">右クリック+ドラッグ または Ctrl+ドラッグ で3D視点を変更できます</div>
          <script>
            /*
              ========================================================
              PMTiles プロトコルの登録（将来の自前データ配信に備えて）
              maplibregl.addProtocol() で "pmtiles://" スキームを使えるようにします。
              将来、source の url を "pmtiles://https://..." に変えるだけで
              Cloudflare R2 上の PMTiles ファイルを読み込めるようになります。
              ========================================================
            */
            const pmtilesProtocol = new pmtiles.Protocol();
            maplibregl.addProtocol('pmtiles', pmtilesProtocol.tile.bind(pmtilesProtocol));


            /*
              ========================================================
              GSJ NumPNG タイルを Terrarium 形式に変換するカスタムプロトコルの登録
              ========================================================
              参考実装: qchizu/qchizu-maps-maplibregljs (demTranscoderProtocol.js)
        
              【なぜ単純な (128,0,0) 置換では不十分なのか？】
              GSJ タイルは「NumPNG（符号付き24ビット整数）」形式で標高を格納しています。
              MapLibre には NumPNG を直接デコードする機能がありません。
              そのため、タイルを取得するたびに JavaScript でデコードし、
              MapLibre が理解できる「Terrarium」形式に変換して渡す必要があります。
        
              【NumPNG → Terrarium 変換の手順】
                1. PNG を ImageBitmap → OffscreenCanvas でピクセルとして読み取る
                2. R, G, B から 24ビット整数を組み立てる
                   bits24 = (R << 16) | (G << 8) | B
                3. 符号を考慮して標高（メートル）を求める
                   height = ((bits24 << 8) >> 8) * 0.01
                   ← 左に8ビットシフトして最上位ビットを符号ビットとして扱い、
                      右に8ビット算術シフトで符号を復元（負の標高も正しく計算）
                4. Terrarium 形式に再エンコードする
                   Terrarium の式: height = R×256 + G + B/256 − 32768
                   → 逆算: t = height + 32768
                           R_new = floor(t / 256)
                           G_new = floor(t % 256)
                           B_new = floor((t % 1) * 256)
                5. 変換済み PNG を ArrayBuffer として MapLibre に返す
        
              【無効値 (128, 0, 0) とアルファ < 255 の扱い】
                無効値 → Terrarium で height = 0m に相当する (128, 0, 0) にマップ
                海面・レーザー未計測域が「巨大な山」や「深い穴」にならなくなります。
              ========================================================
            */
            maplibregl.addProtocol('gsjdem', async (params, abortController) => {
              // 'gsjdem://' を 'https://' に置き換えて実際の GSJ タイル URL を組み立てます
              const url = params.url.replace('gsjdem://', 'https://');

              // GSJ タイルサーバーから PNG 画像を取得します
              const response = await fetch(url, {
                signal: abortController.signal
              });

              if (!response.ok) throw new Error(`GSJ DEM fetch failed: $ {
          response.status
        }

        `);

              // Blob → ImageBitmap に変換します
              const bitmap = await createImageBitmap(await response.blob());

              // OffscreenCanvas はメインスレッドを妨げず、色空間変換が入りにくい利点があります
              // （document.createElement('canvas') だとブラウザの画面描画設定が影響することがある）
              const canvas = new OffscreenCanvas(bitmap.width, bitmap.height);
              const ctx = canvas.getContext('2d');
              ctx.drawImage(bitmap, 0, 0);

              // [R, G, B, A, R, G, B, A, ...] の形の 1 次元配列を取得します（各ピクセル 4 バイト）
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const data = imageData.data;

              // ピクセルを 4 バイトずつ処理します
              for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];

                // ① 無効値ピクセル (128, 0, 0) またはアルファが 255 未満のピクセルは
                //    Terrarium で height = 0m を表す (128, 0, 0) にマップします
                //    ← そのまま Terrarium デコードすると 128×256 + 0 − 32768 = 0m
                if ((r === 128 && g === 0 && b === 0) || a !== 255) {
                  data[i] = 128;
                  data[i + 1] = 0;
                  data[i + 2] = 0;
                  data[i + 3] = 255;
                  continue; // 次のピクセルへ
                }

                // ② GSJ NumPNG → 標高（メートル）にデコードします
                //    3 バイトを 24 ビット整数として結合します
                const bits24 = (r << 16) | (g << 8) | b;
                //    32 ビット演算で符号付き 24 ビット整数として解釈します：
                //    左 8 ビットシフトで最上位ビットを 32 ビットの符号ビット位置へ移動し、
                //    右 8 ビット算術シフト（>>）で符号を復元しつつ元の位置に戻します
                const height = ((bits24 << 8) >> 8) * 0.01; // 単位：メートル

                // ③ 標高を Terrarium 形式に再エンコードします
                //    Terrarium デコード式: height = R×256 + G + B/256 − 32768
                //    → 逆算: t = height + 32768 として R/G/B を求めます
                const t = height + 32768;
                data[i] = Math.min(255, Math.max(0, Math.floor(t / 256))); // R
                data[i + 1] = Math.min(255, Math.max(0, Math.floor(t % 256))); // G
                data[i + 2] = Math.min(255, Math.max(0, Math.floor((t % 1) * 256))); // B
                data[i + 3] = 255; // Alpha は不透明のまま
              }

              // 変換後のピクセルデータを Canvas に書き戻します
              ctx.putImageData(imageData, 0, 0);

              // OffscreenCanvas の convertToBlob() → ArrayBuffer に変換して MapLibre に返します
              const blob = await canvas.convertToBlob({
                type: 'image/png'
              });

              return {
                data: await blob.arrayBuffer()
              }

                ;
            });


            /* ========================================================
               ★ カスタマイズポイント：各種URLと初期パラメータをここで変更します
               ======================================================== */

            // ★ 標高（DEM）タイルのURL（産総研シームレス標高タイル mixed）
            const TERRAIN_URL = 'gsjdem://tiles.gsj.jp/tiles/elev/mixed/{z}/{y}/{x}.png';

            // ★ OriLibre（オリエンテーリング風地図）のプロジェクト設定URL
            //   isomizer がこのYAMLを読み込み、ベースマップのベクタースタイルを動的に構築する。
            //   Japan版: 国土地理院ベクタータイル + OpenFreeMap + 産総研等高線 + 農林水産省筆ポリゴン
            const ORILIBRE_PROJECT_URL = 'https://cdn.jsdelivr.net/gh/tjmsy/isomizer-projectfiles@0.3/projects/isomized-japan/project-config.yml';

            // ★ CS立体図（地理院タイル・全国）
            //   1mDEM整備エリアは高精度、未整備は5mDEM由来。
            const CS_RELIEF_URL = 'https://cyberjapandata.gsi.go.jp/xyz/cs/{z}/{x}/{y}.png';

            // ★ 地域別CS立体図（0.5mDEM由来・高精度）の定義リスト
            //   在る地域では全国地理院CSタイルよりも高解像度なため、上層に重ねて表示する。
            //   source id : Map内部のID、layer id : 同左 + '-layer'
            //   tileUrl   : XYZタイルURLテンプレート
            //   label     : UI表示名（ユーザー指定形式）
            //   maxzoom   : サーバー側のタイル最大ズーム（オーバーズームで引き伸ばす）
            //   attribution: 帰属表記
            const REGIONAL_CS_LAYERS = [{
              sourceId: 'cs-kyoto',
              layerId: 'cs-kyoto-layer',
              tileUrl: 'https://forestgeo.info/opendata/26_kyoto/csmap_2024/{z}/{x}/{y}.webp',
              label: 'CS立体図（0.5m）—京都府',
              maxzoom: 18,
              attribution: '林野庁（京都府0.5mCS）',
            }

              ,
            {
              sourceId: 'cs-shiga',
              layerId: 'cs-shiga-layer',

            // 等高線レイヤーIDリスト（isomizer完了後に収集）

              console.log('等高線レイヤー（isomizer生成）:', contourLayerIds);

              // isomizerが等高線レイヤーを生成しなかった場合、ISOM2017スタイルで明示的に追加

            /* ========================================================
               KMZ 読み込み済みレイヤーの管理リスト
               各エントリは以下の情報を保持します：
                 id        : 連番（ユニークなソース/レイヤーIDの生成に使用）
                 name      : ファイル名（UIに表示）
                 sourceId  : MapLibre に登録したソースのID
                 layerId   : MapLibre に登録したレイヤーのID
                 objectUrl : 画像のObjectURL（不要になったら revoke が必要）
               ======================================================== */
            const kmzLayers = [];
            let kmzCounter = 0;


            /* ========================================================
               KMZ ファイルを処理するメイン関数
               引数 file : ユーザーが選択した File オブジェクト
               ======================================================== */
            async function loadKmz(file) {
              try {
                /*
                  --- ステップ① JSZip で KMZ（ZIP）を解凍する ---
                  file.arrayBuffer() でファイルの中身をバイト列として読み込み、
                  JSZip.loadAsync() に渡すことで ZIP の中身を展開します。
                  zip.files はファイルパスをキー、ZipObject を値とするオブジェクトです。
                */
                const arrayBuffer = await file.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);

                // ZIP 内のすべてのファイルパスを配列にまとめる
                const fileNames = Object.keys(zip.files);

                /*
                  --- ステップ② KML ファイルを特定する ---
                  KMZ の中には通常 "doc.kml" という名前で KML が入っています。
                  ただし名前が異なる場合もあるため、拡張子 .kml で検索します。
                */
                const kmlFileName = fileNames.find(name => name.toLowerCase().endsWith('.kml'));

                if (!kmlFileName) {
                  alert('エラー：KMZファイルの中にKMLファイルが見つかりませんでした。\nファイルが正しい形式かどうかを確認してください。');
                  return;
                }

                // KML ファイルの内容をテキスト（文字列）として取得する
                const kmlText = await zip.files[kmlFileName].async('text');

                /*
                  --- ステップ③ KML を XML として解析（パース）する ---
                  DOMParser は HTML や XML をブラウザのDOM構造に変換する標準APIです。
                  これにより、XML のタグ名で要素を検索できるようになります。
                */
                const parser = new DOMParser();
                const kmlDom = parser.parseFromString(kmlText, 'text/xml');

                /*
                  --- ステップ④ GroundOverlay タグを探す ---
                  GroundOverlay は KML の「画像を地図上の指定範囲に貼り付ける」要素です。
                  オリエンテーリングマップの KMZ では通常ここにマップ画像の情報が入っています。
                */
                const groundOverlay = kmlDom.querySelector('GroundOverlay');

                if (!groundOverlay) {
                  alert('エラー：KMLファイルの中にGroundOverlay要素が見つかりませんでした。\nこのKMZはオーバーレイ画像を含んでいない可能性があります。');
                  return;
                }

                /*
                  --- ステップ⑤ LatLonBox から座標情報を取り出す ---
                  LatLonBox は画像を貼り付ける矩形の緯度経度範囲と回転角を定義します。
                  各タグの textContent を数値に変換して取得します。
                */
                const latLonBox = groundOverlay.querySelector('LatLonBox');

                if (!latLonBox) {
                  alert('エラー：GroundOverlay の中に LatLonBox 要素が見つかりませんでした。');
                  return;
                }

                // テキストで書かれた緯度経度を数値に変換する
                const north = parseFloat(latLonBox.querySelector('north').textContent);
                const south = parseFloat(latLonBox.querySelector('south').textContent);
                const east = parseFloat(latLonBox.querySelector('east').textContent);
                const west = parseFloat(latLonBox.querySelector('west').textContent);
                // rotation は省略されることもあるので、ない場合は 0 とする
                const rotation = parseFloat(latLonBox.querySelector('rotation')?.textContent ?? '0'
                );

                if (isNaN(north) || isNaN(south) || isNaN(east) || isNaN(west)) {
                  alert('エラー：LatLonBox の座標値が正しく読み取れませんでした。');
                  return;
                }

                /*
                  --- ステップ⑥ MapLibre の coordinates 配列を計算する ---
        
                  MapLibre の image source の coordinates は以下の順番で4点を指定します：
                    [ 左上(TL), 右上(TR), 右下(BR), 左下(BL) ]
                    = [ [西,北], [東,北], [東,南], [西,南] ]
                  （※ 経度が先、緯度が後 = [lng, lat] の順）
        
                  KML の LatLonBox には rotation（反時計回り、単位:度）が含まれる場合があります。
                  rotation が 0 でない場合、単純に north/south/east/west を組み合わせるだけでは
                  画像が傾いた状態で正しく配置されません。
        
                  そのため、矩形の中心を基準に各コーナーを回転させて計算します。
                */

                // 矩形の中心座標（経度・緯度）
                const cx = (east + west) / 2;
                const cy = (north + south) / 2;

                // 中心から各コーナーまでの幅・高さの半分
                const hw = (east - west) / 2; // 水平方向の半幅
                const hh = (north - south) / 2; // 垂直方向の半高さ

                // KML の rotation は反時計回りなので、sin/cos に渡す角度は正の方向が反時計回り
                const rad = rotation * Math.PI / 180;
                const cosR = Math.cos(rad);
                const sinR = Math.sin(rad);

                /*
                  回転変換の式：
                    dx' = dx * cos(θ) - dy * sin(θ)
                    dy' = dx * sin(θ) + dy * cos(θ)
                  各コーナーの中心からのオフセット（dx, dy）を回転させ、中心座標に足す。
        
                  コーナーの定義（回転前）：
                    TL: dx = -hw, dy = +hh  （西, 北）
                    TR: dx = +hw, dy = +hh  （東, 北）
                    BR: dx = +hw, dy = -hh  （東, 南）
                    BL: dx = -hw, dy = -hh  （西, 南）
                */
                function rotateCorner(dx, dy) {
                  return [cx + dx * cosR - dy * sinR,
                  // 回転後の経度
                  cy + dx * sinR + dy * cosR,
                    // 回転後の緯度
                  ];
                }

                // MapLibre の coordinates 配列（TL → TR → BR → BL の順）
                const coordinates = [rotateCorner(-hw, +hh),
                // 左上（TL）
                rotateCorner(+hw, +hh),
                // 右上（TR）
                rotateCorner(+hw, -hh),
                // 右下（BR）
                rotateCorner(-hw, -hh),
                  // 左下（BL）
                ];

                /*
                  --- ステップ⑦ KML 内の画像ファイルを特定して ObjectURL を生成する ---
                  GroundOverlay > Icon > href タグに画像ファイルのパスが書かれています。
                  そのファイルを ZIP から取り出し、Blob → ObjectURL に変換します。
                */
                const iconHref = groundOverlay.querySelector('Icon > href')?.textContent?.trim();

                if (!iconHref) {
                  alert('エラー：GroundOverlay に Icon/href が見つかりませんでした。');
                  return;
                }

                // ZIP 内でのファイルパスを検索（階層付きパスに対応）
                const imgEntry = zip.files[iconHref] ?? zip.files[fileNames.find(n => n.endsWith('/' + iconHref) || n === iconHref)];

                if (!imgEntry) {
                  alert(`エラー：KMZ内に画像ファイル "${iconHref}" が見つかりませんでした。`);
                  return;
                }

                // 画像をバイナリとして取り出し、Blob に変換する
                const imgBlob = await imgEntry.async('blob');

                /*
                  URL.createObjectURL() は Blob をブラウザ内で使えるメモリURL（"blob:..." 形式）に変換します。
                  この URL は通常の https:// のように MapLibre から参照できます。
                  レイヤーを削除する際には URL.revokeObjectURL() でメモリを解放することが重要です。
                */
                const objectUrl = URL.createObjectURL(imgBlob);

                /*
                  --- ステップ⑧ MapLibre にソースとレイヤーを追加する ---
                  各 KMZ に一意の ID を付けて管理します。
                */
                const id = kmzCounter++;

                const sourceId = `kmz-source-$ {
          id
        }

        `;

                const layerId = `kmz-layer-$ {
          id
        }

        `;

                /*
                  type: 'image' は「指定した4点の座標に画像を貼り付ける」特殊なソースタイプです。
                  url   : 表示する画像のURL（ObjectURL を使用）
                  coordinates : [ TL, TR, BR, BL ] の順番で [lng, lat] 配列を4つ指定
                */
                map.addSource(sourceId, {
                  type: 'image',
                  url: objectUrl,
                  coordinates: coordinates,
                });

                // KMZレイヤーを最上層に追加
                // ★ 高ズーム時のクリッピング対策:
                //   MapLibreのimageソースはWebGLの頂点クリッピングにより高ズームで画像が切れる既知の問題がある。
                //   raster-fade-duration:0 で再描画を安定させ、minzoom/maxzoomで描画範囲を明示指定する。
                map.addLayer({
                  id: layerId,
                  type: 'raster',
                  source: sourceId,
                  minzoom: 0,
                  maxzoom: 24, // 全ズームで描画を許可（制限しないことで内部クリップを防ぐ）

                  paint: {
                    'raster-opacity': OMAP_INITIAL_OPACITY,
                    'raster-fade-duration': 0, // フェードをなくして再描画タイミングのズレを防ぐ
                    'raster-resampling': 'linear', // 高ズーム時のリサンプリング品質を向上
                  }

                  ,
                });
                // レイヤーを確実に最上層へ移動（等高線・CSレイヤーより上に）
                map.moveLayer(layerId);

                // --- ステップ⑨ 地図全体が収まる範囲にフィット ---
                // 回転後コーナー座標（coordinates）から正確な BBox を計算する。
                const allLngs = coordinates.map(c => c[0]);
                const allLats = coordinates.map(c => c[1]);
                const bboxWest = Math.min(...allLngs);
                const bboxEast = Math.max(...allLngs);
                const bboxSouth = Math.min(...allLats);
                const bboxNorth = Math.max(...allLats);
                // UIパネル（左約 320px）を考慮した非対称 padding を指定する。
                // padding.left を大きくすることでパネル右の可視エリアにKMZが収まる。
                const panelWidth = document.getElementById('ui-panel')?.offsetWidth ?? 320;

                map.fitBounds([[bboxWest, bboxSouth], [bboxEast, bboxNorth]],
                  {
                    padding: {
                      top: 60, bottom: 60, left: panelWidth + 30, right: 60
                    }

                    ,
                    pitch: INITIAL_PITCH,
                    duration: 600,
                    maxZoom: 19, // 過度なズームインを防ぎKMZ全体を表示
                  });
                // fitBounds後も画像が最上層になるよう必ず moveLayer
                map.moveLayer(layerId);

                // 管理リストに追加（visible・opacityも保持して個別制御できるようにする）
                const entry = {
                  id,
                  name: file.name, sourceId, layerId, objectUrl, visible: true, opacity: OMAP_INITIAL_OPACITY
                }

                  ;
                kmzLayers.push(entry);

                // UIの一覧を更新する
                renderKmzList();

                console.log(`KMZ 読み込み完了: $ {
        file.name
      }

      `, {
                  coordinates, rotation
                });

              }

              catch (err) {
                console.error('KMZ読み込みエラー:', err);

                alert(`KMZファイルの読み込み中にエラーが発生しました。\n詳細: $ {
          err.message
        }

        `);
              }
            }


            /*
              ========================================================
              読み込み済みKMZレイヤーの一覧をUIに描画する
              ========================================================
            */
            /*
              KMZレイヤー一覧をUIに描画する。
              各エントリに表示/非表示チェックボックス・透明度スライダー・削除ボタンを追加。
            */
            function renderKmzList() {
              const listEl = document.getElementById('kmz-list');
              listEl.innerHTML = '';

              if (kmzLayers.length === 0) return;

              kmzLayers.forEach(entry => {
                // 名前（拡張子なし）
                const shortName = entry.name.replace(/\.kmz$/i, '');
                const pct = Math.round(entry.opacity * 100);

                const rowEl = document.createElement('div');
                rowEl.className = 'layer-row';
                rowEl.dataset.id = entry.id;

                rowEl.innerHTML = ` <div class="layer-label-row" > <input type="checkbox" id="chk-kmz-${entry.id}"$ {
            entry.visible ? 'checked' : ''
          }

          /> <label class="layer-name${entry.visible ? '' : ' disabled'}" for="chk-kmz-${entry.id}" title="${entry.name}" >$ {
            shortName
          }

          </label> <button class="kmz-del-btn" title="削除" onclick="removeKmzLayer(${entry.id})" >✕</button> </div> <div class="opacity-row" > <input type="range" id="slider-kmz-${entry.id}" min="0" max="1" step="0.05" value="${entry.opacity}"$ {
            entry.visible ? '' : 'disabled'
          }

          /> <span class="opacity-val" id="val-kmz-${entry.id}" >$ {
            pct
          }

          %</span> </div> `;
                listEl.appendChild(rowEl);

                // チェックボックス：表示/非表示
                rowEl.querySelector(`#chk-kmz-$ {
              entry.id
            }

            `).addEventListener('change', (e) => {
                  entry.visible = e.target.checked;
                  const label = rowEl.querySelector('.layer-name');

                  const slider = rowEl.querySelector(`#slider-kmz-$ {
                  entry.id
                }

                `);
                  label.classList.toggle('disabled', !entry.visible);
                  slider.disabled = !entry.visible;

                  if (map.getLayer(entry.layerId)) {
                    map.setPaintProperty(entry.layerId, 'raster-opacity', entry.visible ? entry.opacity : 0);
                  }
                });

                // スライダー：透明度
                const sliderEl = rowEl.querySelector(`#slider-kmz-$ {
              entry.id
            }

            `);

                const valEl = rowEl.querySelector(`#val-kmz-$ {
              entry.id
            }

            `);
                updateSliderGradient(sliderEl, '#4a7c59');

                sliderEl.addEventListener('input', () => {
                  entry.opacity = parseFloat(sliderEl.value);
                  valEl.textContent = Math.round(entry.opacity * 100) + '%';
                  updateSliderGradient(sliderEl, '#4a7c59');

                  if (entry.visible && map.getLayer(entry.layerId)) {
                    map.setPaintProperty(entry.layerId, 'raster-opacity', entry.opacity);
                  }
                });
              });
            }


            /*
              KMZレイヤーを地図とリストから削除する
            */
            function removeKmzLayer(id) {
              const idx = kmzLayers.findIndex(e => e.id === id);
              if (idx === -1) return;

              const entry = kmzLayers[idx];
              if (map.getLayer(entry.layerId)) map.removeLayer(entry.layerId);
              if (map.getSource(entry.sourceId)) map.removeSource(entry.sourceId);
              URL.revokeObjectURL(entry.objectUrl);
              kmzLayers.splice(idx, 1);
              renderKmzList();
            }


            /* ========================================================
               ファイル選択ボタンの制御
               ======================================================== */

            const kmzFileInput = document.getElementById('kmz-file-input');
            const kmzUploadBtn = document.getElementById('kmz-upload-btn');

            // ボタンをクリックすると非表示の <input type="file"> を呼び出す
            kmzUploadBtn.addEventListener('click', () => kmzFileInput.click());

            // ファイルが選択されたら loadKmz を呼び出す（複数ファイル対応）
            kmzFileInput.addEventListener('change', async (e) => {
              for (const file of e.target.files) {
                await loadKmz(file);
              }

              // 同じファイルを再選択できるよう入力をリセット
              e.target.value = '';
            });


            /* ========================================================
               ドラッグ＆ドロップの制御
               ブラウザウィンドウ全体にドラッグしたとき、オーバーレイを表示して
               ドロップされたファイルを loadKmz に渡します。
               ======================================================== */

            const dropOverlay = document.getElementById('drop-overlay');
            let dragCounter = 0; // 子要素への出入りで誤作動しないようにカウンター管理

            document.addEventListener('dragenter', (e) => {
              e.preventDefault();
              dragCounter++;

              // ファイルがドラッグされているときだけオーバーレイを表示する
              if (e.dataTransfer.types.includes('Files')) {
                dropOverlay.classList.add('visible');
              }
            });

            document.addEventListener('dragleave', () => {
              dragCounter--;

              if (dragCounter <= 0) {
                dragCounter = 0;
                dropOverlay.classList.remove('visible');
              }
            });

            document.addEventListener('dragover', (e) => {
              // デフォルト動作（ブラウザがファイルを開く）を止める
              e.preventDefault();
            });

            document.addEventListener('drop', async (e) => {
              e.preventDefault();
              dragCounter = 0;
              dropOverlay.classList.remove('visible');

              // ドロップされたファイルのうち .kmz のみ処理する
              const files = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.kmz'));

              if (files.length === 0) {
                alert('.kmz ファイルをドロップしてください。');
                return;
              }

              for (const file of files) {
                await loadKmz(file);
              }
            });


            /* ========================================================
               UIスライダー・チェックボックスのイベントリスナー設定
               ======================================================== */

            // ---- スライダーのグラデーション更新ヘルパー ----
            // color: スライダーのアクセントカラー（デフォルト：グリーン系）
            function updateSliderGradient(input, color) {
              const pct = ((input.value - input.min) / (input.max - input.min)) * 100;
              input.style.setProperty('--pct', pct + '%');

              if (color) {
                input.style.background = `linear-gradient(to right, $ {
            color
          }

          $ {
            pct
          }

          %, #d0d0d0 $ {
            pct
          }

          %)`;
              }
            }

            /* ======================================================
               地域別CS立体図（0.5m）のUI生成とイベントリスナー設定
               map.on('load') 内で buildRegionalCsUI() を呼び出す。
               ====================================================== */
            function buildRegionalCsUI() {
              const container = document.getElementById('regional-cs-list');
              container.innerHTML = '';

              REGIONAL_CS_LAYERS.forEach(layer => {
                const chkId = `chk-$ {
            layer.sourceId
          }

          `;

                const sliderId = `slider-$ {
            layer.sourceId
          }

          `;

                const valId = `val-$ {
            layer.sourceId
          }

          `;

                // レイヤー行を生成（デフォルト：未チェック + スライダー disabled）
                const rowEl = document.createElement('div');
                rowEl.className = 'layer-row';

                rowEl.innerHTML = ` <div class="layer-label-row" > <input type="checkbox" id="${chkId}" /> <label class="layer-name disabled" for="${chkId}" >$ {
            layer.label
          }

          </label> </div> <div class="opacity-row" > <input type="range" id="${sliderId}" min="0" max="1" step="0.05" value="1.0" disabled /> <span class="opacity-val" id="${valId}" >100%</span> </div> `;
                container.appendChild(rowEl);

                const chkEl = rowEl.querySelector(`#$ {
              chkId
            }

            `);

                const sliderEl = rowEl.querySelector(`#$ {
              sliderId
            }

            `);

                const valEl = rowEl.querySelector(`#$ {
              valId
            }

            `);
                const labelEl = rowEl.querySelector('label');

                updateSliderGradient(sliderEl, '#4a7c59');

                // チェックボックス: 表示/非表示
                chkEl.addEventListener('change', () => {
                  const isOn = chkEl.checked;
                  labelEl.classList.toggle('disabled', !isOn);
                  sliderEl.disabled = !isOn;

                  if (map.getLayer(layer.layerId)) {
                    map.setPaintProperty(layer.layerId, 'raster-opacity',
                      isOn ? parseFloat(sliderEl.value) : 0);
                  }
                });

                // スライダー: 透明度
                sliderEl.addEventListener('input', () => {
                  const v = parseFloat(sliderEl.value);
                  valEl.textContent = Math.round(v * 100) + '%';
                  updateSliderGradient(sliderEl, '#4a7c59');

                  if (chkEl.checked && map.getLayer(layer.layerId)) {
                    map.setPaintProperty(layer.layerId, 'raster-opacity', v);
                  }
                });
              });
            }

            // ---- CS立体図 チェックボックス ----
            const chkCs = document.getElementById('chk-cs');

            chkCs.addEventListener('change', () => {
              const label = document.querySelector('label[for="chk-cs"]');
              const slider = document.getElementById('slider-cs');
              label.classList.toggle('disabled', !chkCs.checked);
              slider.disabled = !chkCs.checked;

              if (map.getLayer('cs-relief-layer')) {
                map.setPaintProperty('cs-relief-layer', 'raster-opacity',
                  chkCs.checked ? parseFloat(slider.value) : 0);
              }
            });

            // ---- CS立体図 透明度スライダー ----
            const sliderCs = document.getElementById('slider-cs');
            const valCs = document.getElementById('val-cs');
            updateSliderGradient(sliderCs, '#4a7c59');

            sliderCs.addEventListener('input', () => {
              valCs.textContent = Math.round(parseFloat(sliderCs.value) * 100) + '%';
              updateSliderGradient(sliderCs, '#4a7c59');

              if (chkCs.checked && map.getLayer('cs-relief-layer')) {
                map.setPaintProperty('cs-relief-layer', 'raster-opacity', parseFloat(sliderCs.value));
              }
            });

            // ---- 色別標高図 チェックボックス ----
            const chkElev = document.getElementById('chk-elev');

            chkElev.addEventListener('change', () => {
              const label = document.querySelector('label[for="chk-elev"]');
              const slider = document.getElementById('slider-elev');
              label.classList.toggle('disabled', !chkElev.checked);
              slider.disabled = !chkElev.checked;

              if (map.getLayer('color-elev-layer')) {
                map.setPaintProperty('color-elev-layer', 'raster-opacity',
                  chkElev.checked ? parseFloat(slider.value) : 0);
              }
            });

            // ---- 色別標高図 透明度スライダー ----
            const sliderElev = document.getElementById('slider-elev');
            const valElev = document.getElementById('val-elev');
            updateSliderGradient(sliderElev, '#4a7c59');

            sliderElev.addEventListener('input', () => {
              valElev.textContent = Math.round(parseFloat(sliderElev.value) * 100) + '%';
              updateSliderGradient(sliderElev, '#4a7c59');

              if (chkElev.checked && map.getLayer('color-elev-layer')) {
                map.setPaintProperty('color-elev-layer', 'raster-opacity', parseFloat(sliderElev.value));
              }
            });

            // ---- 地形誇張スライダー ----
            const sliderExaggeration = document.getElementById('slider-exaggeration');
            const valExaggeration = document.getElementById('val-exaggeration');
            updateSliderGradient(sliderExaggeration, '#6a8fa0');

            sliderExaggeration.addEventListener('input', () => {
              const v = parseFloat(sliderExaggeration.value);
              valExaggeration.textContent = v.toFixed(1) + '×';
              updateSliderGradient(sliderExaggeration, '#6a8fa0');

              map.setTerrain({
                source: 'terrain-dem', exaggeration: v
              });
            });

            // ---- 等高線 チェックボックス ----
            const chkContour = document.getElementById('chk-contour');
            const selContour = document.getElementById('sel-contour-interval');

            chkContour.addEventListener('change', () => {
              const vis = chkContour.checked ? 'visible' : 'none';

              contourLayerIds.forEach(id => {
                if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
              });
              selContour.disabled = !chkContour.checked;
              document.querySelector('label[for="chk-contour"]').classList.toggle('disabled', !chkContour.checked);
            });

            // ---- 等高線 間隔セレクト ----
            selContour.addEventListener('change', () => {
              const interval = parseFloat(selContour.value);
              const newUrl = buildContourTileUrl(interval);

              if (newUrl && map.getSource('contour-source')) {
                // MapLibre 4.x: VectorTileSource.setTiles() で動的更新
                map.getSource('contour-source').setTiles([newUrl]);
              }
            });

            // ---- パネル折りたたみ ----
            document.getElementById('ui-panel-header').addEventListener('click', () => {
              const body = document.getElementById('ui-panel-body');
              const icon = document.getElementById('panel-toggle-icon');
              const isOpen = body.style.display !== 'none';
              body.style.display = isOpen ? 'none' : '';
              icon.textContent = isOpen ? '▼' : '▲';
            });

            // ---- 縮尺表示・ズーム連動 ----
            // 移器の画面解像度を考慮する
            // 縮尺計算式: scale = (地面記載法[m/px] * 96DPI) / 0.0254[m/inch]
            const SCREEN_DPI = (window.devicePixelRatio || 1) * 96;

            function calcScaleDenominator() {
              const center = map.getCenter();
              const zoom = map.getZoom();
              // 優捱2のタイル1枚=256px基準の地面解像度（m/px）
              const groundRes = 156543.03392 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, zoom);
              return Math.round(groundRes * SCREEN_DPI / 0.0254);
            }

            function updateScaleDisplay() {
              const s = calcScaleDenominator();
              document.getElementById('scale-display').textContent = s.toLocaleString('ja-JP');
            }

            // マップ移動・ズームで縮尺を更新
            map.on('move', updateScaleDisplay);
            map.on('zoom', updateScaleDisplay);
            // isomizer完了後に一度更新（load内でjumpTo後に発火）
            map.once('idle', updateScaleDisplay);

            // 縮尺プルダウン→対応ズームに移動
            document.getElementById('sel-scale').addEventListener('change', (e) => {
              const targetScale = parseInt(e.target.value, 10);
              if (!targetScale) return;
              // 縮尺分母からズームを逆算
              // zoom = log2(地面解像度 / (targetScale * 0.0254 / DPI))
              const center = map.getCenter();
              const targetGroundRes = targetScale * 0.0254 / SCREEN_DPI;
              const zoom = Math.log2(156543.03392 * Math.cos(center.lat * Math.PI / 180) / targetGroundRes);

              map.easeTo({
                zoom, duration: 600
              });
              e.target.value = ''; // 選択リセット（再度同じ値を選べるように）
            });

            // スライダーの初期値をUIに反映
            sliderCs.value = CS_INITIAL_OPACITY;
            valCs.textContent = Math.round(CS_INITIAL_OPACITY * 100) + '%';
            // 色別標高図はデフォルト非表示—スライダー表示値は ELEV_INITIAL_OPACITY
            sliderElev.value = ELEV_INITIAL_OPACITY;
            valElev.textContent = Math.round(ELEV_INITIAL_OPACITY * 100) + '%';
            sliderExaggeration.value = TERRAIN_EXAGGERATION;
            valExaggeration.textContent = TERRAIN_EXAGGERATION.toFixed(1) + '×';

          </script>
</body>

</html>
