<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMAP 3D</title>

  <!--
    ========================================================
    MapLibre GL JS の読み込み
    WebGL を使ってブラウザ上でインタラクティブな地図を描画するライブラリです。
    3D地形表示（Terrain）や画像オーバーレイなどの機能を持ちます。
    ========================================================
  -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!--
    ========================================================
    PMTiles の読み込み（将来用）
    PMTiles は大量のタイルを1つのファイルにまとめてCloudflare R2などに置き、
    HTTP Range Request で必要部分だけを取得できる次世代フォーマットです。
    将来的に自前のOMAPデータをPMTilesで配信する際に使います。
    ========================================================
  -->
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>

  <!--
    ========================================================
    JSZip の読み込み
    KMZファイルは実態が ZIP 形式の圧縮ファイルです。
    JSZip を使うことで、ブラウザ（JavaScript）上で ZIP を解凍し、
    中に入っている KML ファイルや画像ファイルを取り出すことができます。
    サーバーへのアップロードは不要で、すべてクライアント側で完結します。
    ========================================================
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!--
    ========================================================
    OriLibre（isomizer）が必要とする依存ライブラリ
    mlcontour : DEMタイルから等高線を生成するライブラリ（isomizer内部で使用）
    js-yaml   : isomizerがYAMLプロジェクト設定ファイルを読み込むために使用
    ========================================================
  -->
  <script
    src="https://cdn.jsdelivr.net/gh/qchizu/maplibre-contour-adding-Numerical-PNG-Tile@main/dist/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <!--
    ========================================================
    GPXファイルはブラウザ標準のDOMParser + querySelectorAll('trkpt')
    でネイティブ解析します。外部ライブラリは不使用です。
    ========================================================
  -->

  <!--
    ========================================================
    Turf.js の読み込み
    2点間の方位角計算・線形補間など空間演算を行うライブラリです。
    GPXリプレイ時のカメラ方向（進行方向）の計算に使用します。
    ========================================================
  -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <!--
    ========================================================
    TensorFlow.js の読み込み
    CS立体図をDEMタイルからブラウザ内で動的生成するために使用します。
    WebGLバックエンドで高速な畳み込み演算（ガウシアン平滑化）を実行します。
    qchizu-project/qchizu-maps-maplibregljs のアルゴリズムを参考にしています。
    ========================================================
  -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4/dist/tf.min.js"></script>

  <style>
    /*
      ========================================================
      全画面表示のスタイル設定
      ========================================================
    */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ---- UIパネル（地理院地図/Q地図スタイル） ---- */
    #ui-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: #fff;
      border: 1px solid #c8c8c8;
      border-radius: 4px;
      padding: 0;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      font-size: 12px;
      min-width: 220px;
      max-width: 260px;
      color: #333;
    }

    #ui-panel-header {
      background: #4a7c59;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      border-radius: 4px 4px 0 0;
    }

    #ui-panel-header span {
      font-size: 11px;
      opacity: 1.05;
    }

    #ui-panel-body {
      padding: 0;
      overflow-y: auto;
      max-height: calc(90vh - 36px);
      /* 36px = header height */
      scrollbar-width: thin;
      /* Firefox slim scrollbar */
      scrollbar-color: #c8c8c8 transparent;
    }

    /* WebKit カスタムスクロールバー（Chrome / Edge / Safari） */
    #ui-panel-body::-webkit-scrollbar {
      width: 4px;
    }

    #ui-panel-body::-webkit-scrollbar-track {
      background: transparent;
    }

    #ui-panel-body::-webkit-scrollbar-thumb {
      background: #c8c8c8;
      border-radius: 2px;
    }

    #ui-panel-body::-webkit-scrollbar-thumb:hover {
      background: #999;
    }

    /* セクションヘッダ（後方互換のため残存） */
    .sec-header {
      background: #f0f0f0;
      border-top: 1px solid #d8d8d8;
      border-bottom: 1px solid #d8d8d8;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      letter-spacing: 0.02em;
    }

    /* ---- アコーディオンセクション (<details> / <summary>) ---- */
    .panel-section {
      margin: 0;
    }

    /* summary がセクションヘッダ代わり */
    .panel-section>summary {
      background: #f0f0f0;
      border-top: 1px solid #d8d8d8;
      border-bottom: 1px solid #d8d8d8;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      letter-spacing: 0.02em;
      list-style: none;
      /* デフォルト▶を非表示 */
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    /* Chrome / Safari でのデフォルトマーカーを消す */
    .panel-section>summary::-webkit-details-marker {
      display: none;
    }

    /* 開閉インジケーター: 開 = ▲、閉 = ▼ */
    .panel-section>summary::after {
      content: '▲';
      font-size: 9px;
      color: #888;
      flex-shrink: 0;
    }

    .panel-section:not([open])>summary::after {
      content: '▼';
    }

    /* ---- CS立体図 都道府県別 サブアコーディオン ---- */
    .cs-regional-details {
      margin: 0;
    }

    .cs-regional-details>summary {
      padding: 5px 10px 5px 14px;
      font-size: 11px;
      font-weight: bold;
      color: #666;
      background: #f4f4f4;
      border-bottom: 1px solid #e0e0e0;
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .cs-regional-details>summary::-webkit-details-marker {
      display: none;
    }

    .cs-regional-details>summary::after {
      content: '▼';
      font-size: 9px;
      color: #888;
    }

    .cs-regional-details[open]>summary::after {
      content: '▲';
    }

    /* ---- 表示設定セクション内の1行レイアウト ---- */
    .setting-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-bottom: 1px solid #ebebeb;
    }
    .setting-row:last-child { border-bottom: none; }

    /* パネル内のすべてのチェックボックスを同一サイズに統一 */
    #ui-panel input[type="checkbox"] {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: #4a7c59;
    }

    .setting-label {
      font-size: 11px;
      color: #333;
      margin-left: auto; /* チェックボックスは左端、ラベルテキストは右端に寄せる */
      white-space: nowrap;
      flex-shrink: 0;
    }

    .setting-sublabel {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: auto;
    }

    .setting-select {
      background: #f0f0f0;
      color: #1a1a1a;
      border: 1px solid #b0b8b0;
      border-radius: 4px;
      padding: 2px 4px;
      font-size: 11px;
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
    }

    .setting-slider {
      flex: 1;
      min-width: 0;
      height: 3px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: linear-gradient(to right, #6a8fa0 var(--pct, 20%), #d0d0d0 var(--pct, 20%));
      outline: none;
    }

    .setting-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid #888;
      cursor: pointer;
    }

    .setting-slider::-webkit-slider-thumb:hover {
      border-color: #6a8fa0;
    }

    .setting-slider:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* 表示設定：左ラベル列 / 右コントロール列 */
    .setting-left {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      min-width: 70px;
      padding-right: 8px;
      border-right: 1px solid #ddd;
    }

    .setting-right {
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 1;
      min-width: 0;
      padding-left: 4px;
    }

    .setting-label.disabled {
      color: #aaa;
    }

    /* レイヤー行 */
    .layer-row {
      padding: 5px 10px 4px;
      border-bottom: 1px solid #ebebeb;
    }

    .layer-row:last-child {
      border-bottom: none;
    }

    /* チェックボックス + ラベル行 */
    .layer-label-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
    }

    /* #ui-panel input[type="checkbox"] に統合済み */

    .layer-name {
      flex: 1;
      font-size: 12px;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      user-select: none;
    }

    .layer-name.disabled {
      color: #aaa;
    }

    .kmz-del-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }

    .kmz-del-btn:hover {
      color: #c0392b;
    }

    /* 透明度スライダー行 */
    .opacity-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 18px;
    }

    .opacity-row input[type="range"] {
      flex: 1;
      height: 3px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: linear-gradient(to right, #4a7c59 var(--pct, 60%), #d0d0d0 var(--pct, 60%));
      outline: none;
    }
    .opacity-row input[type="range"]:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .opacity-row input[type="range"]:disabled ~ .opacity-val {
      color: #aaa;
    }

    .opacity-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid #888;
      cursor: pointer;
    }

    .opacity-row input[type="range"]::-webkit-slider-thumb:hover {
      border-color: #4a7c59;
    }

    .opacity-val {
      min-width: 30px;
      text-align: right;
      font-size: 11px;
      color: #666;
      font-variant-numeric: tabular-nums;
    }

    /* KMZアップロードボタン */
    #kmz-upload-btn {
      display: block;
      width: calc(100% - 20px);
      margin: 6px 10px;
      padding: 5px 10px;
      background: #fff;
      color: #4a7c59;
      border: 1px solid #4a7c59;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }

    #kmz-upload-btn:hover {
      background: #4a7c59;
      color: #fff;
    }

    /* 地形誇張スライダー行 */
    .terrain-row {
      padding: 5px 10px 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .terrain-label {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .terrain-row input[type="range"] {
      flex: 1;
      height: 3px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: linear-gradient(to right, #6a8fa0 var(--pct, 20%), #d0d0d0 var(--pct, 20%));
      outline: none;
    }

    .terrain-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid #888;
      cursor: pointer;
    }

    .terrain-row input[type="range"]::-webkit-slider-thumb:hover {
      border-color: #6a8fa0;
    }

    /* ドラッグ＆ドロップ用オーバーレイ */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(74, 124, 89, 0.12);
      border: 4px dashed #4a7c59;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: #4a7c59;
      pointer-events: none;
    }

    #drop-overlay.visible {
      display: flex;
    }

    /* 操作ヒント */
    #hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* 等高線間隔セレクト */
    .contour-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
    }

    .contour-row label {
      font-size: 11px;
      color: #333;
      white-space: nowrap;
    }

    #sel-contour-interval {
      flex: 1;
      background: #f0f0f0;
      color: #1a1a1a;
      border: 1px solid #b0b8b0;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    #sel-contour-interval:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* 縮尺セレクト（等高線セレクトと同一スタイル） */
    #sel-scale {
      flex: 1;
      font-size: 12px;
      padding: 3px 6px;
    }

    /* チェックボックスのない行でラベル位置を揃えるスペーサー */
    .chk-spacer {
      display: inline-block;
      width: 13px;
      flex-shrink: 0;
    }

    /* 現在位置ボタン（MapLibre GeolocateControl）のカスタムスタイル */
    .maplibregl-ctrl-geolocate {
      background-size: 70% !important;
    }

    /* ---- プライバシー注記 ---- */
    .privacy-note {
      font-size: 10px;
      color: #999;
      padding: 4px 10px 6px;
      line-height: 1.45;
      border-bottom: 1px solid #ebebeb;
    }

    /* GPXアップロードボタン */
    #gpx-upload-btn {
      display: block;
      width: calc(100% - 20px);
      margin: 6px 10px 4px;
      padding: 5px 10px;
      background: #fff;
      color: #5a7a8a;
      border: 1px solid #5a7a8a;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }

    #gpx-upload-btn:hover {
      background: #5a7a8a;
      color: #fff;
    }

    /* ---- 視点切り替えトグルボタン ---- */
    #view-toggle-btn {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #c8c8c8;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: bold;
      color: #333;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      display: none;
      /* GPX読み込み前は非表示 */
      white-space: nowrap;
      transition: background 0.15s;
    }

    #view-toggle-btn:hover {
      background: rgba(240, 240, 240, 0.95);
    }

    #view-toggle-btn.active-first {
      background: #4a7c59;
      color: #fff;
      border-color: #4a7c59;
    }

    /* ---- タイムラインパネル（画面下部） ---- */
    #timeline-panel {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #c8c8c8;
      border-radius: 8px;
      padding: 8px 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      display: none;
      /* GPX読み込み前は非表示 */
      align-items: center;
      gap: 10px;
      min-width: 320px;
      max-width: 90vw;
    }

    #play-pause-btn {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #4a7c59;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    #play-pause-btn:hover {
      background: #3a6349;
    }

    #timeline-controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    #seek-bar {
      width: 100%;
      height: 4px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: linear-gradient(to right, #4a7c59 0%, #d0d0d0 0%);
      outline: none;
    }

    #seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #4a7c59;
      cursor: pointer;
    }

    #time-display {
      font-size: 11px;
      color: #555;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    #speed-select {
      flex-shrink: 0;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #c0c0c0;
      border-radius: 4px;
      padding: 3px 5px;
      font-size: 11px;
      cursor: pointer;
      outline: none;
    }

    /* GPX軌跡が読み込まれているときの情報表示 */
    #gpx-status {
      padding: 4px 10px 5px;
      font-size: 10px;
      color: #5a7a8a;
      border-top: 1px solid #ebebeb;
      display: none;
    }
  </style>
</head>

<body>
  <!-- 地図を描画するコンテナ要素 -->
  <div id="map"></div>
  <!-- UIパネル（地理院地図スタイル） -->
  <div id="ui-panel">
    <div id="ui-panel-header">OMAP 3D <span id="panel-toggle-icon">▲</span></div>
    <div id="ui-panel-body">

      <!-- ===== OMAP / KMZ（デフォルト open） ===== -->
      <details class="panel-section" open>
        <summary>OMAP / KMZ</summary>
        <div id="kmz-list"></div>
        <input type="file" id="kmz-file-input" accept=".kmz" multiple style="display:none" />
        <button id="kmz-upload-btn">＋ KMZファイルを追加</button>
      </details>

      <!-- ===== GPX 軌跡（デフォルト open） ===== -->
      <details class="panel-section" open>
        <summary>GPX 軌跡</summary>
        <div id="gpx-status"></div>
        <input type="file" id="gpx-file-input" accept=".gpx" style="display:none" />
        <button id="gpx-upload-btn">＋ GPXファイルを読み込む</button>
        <p class="privacy-note">※ 読み込んだファイルはブラウザ内でのみ処理されます。サーバーへ送信・保存されることは一切ありません。</p>
      </details>

      <!-- ===== CS立体図（常時表示 + 都道府県別は折りたたみ） ===== -->
      <details class="panel-section" open>
        <summary>CS立体図</summary>
        <!-- 全国CS（5mDEM）― 常時表示 -->
        <div class="layer-row" id="row-cs">
          <div class="layer-label-row">
            <input type="checkbox" id="chk-cs" />
            <label class="layer-name disabled" for="chk-cs">CS立体図（1m）- Q地図･国土地理院</label>
          </div>
          <div class="opacity-row">
            <input type="range" id="slider-cs" min="0" max="1" step="0.05" value="1.0" disabled />
            <span class="opacity-val" id="val-cs">100%</span>
          </div>
        </div>

  <!-- 操作ヒント表示（出典表示と被るため非表示）
  <div id="hint">右クリック+ドラッグ または Ctrl+ドラッグ で3D視点を変更できます</div>
  -->
  <script>
    /*
      ========================================================
      PMTiles プロトコルの登録（将来の自前データ配信に備えて）
      maplibregl.addProtocol() で "pmtiles://" スキームを使えるようにします。
      将来、source の url を "pmtiles://https://..." に変えるだけで
      Cloudflare R2 上の PMTiles ファイルを読み込めるようになります。
      ========================================================
    */
    const pmtilesProtocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', pmtilesProtocol.tile.bind(pmtilesProtocol));


    /*
      ========================================================
      GSJ NumPNG タイルを Terrarium 形式に変換するカスタムプロトコルの登録
      GSJ タイルは符号付き24ビット整数（NumPNG）形式のため、
      MapLibre が理解できる Terrarium 形式にピクセル単位で変換して渡します。
      ========================================================
    */
    maplibregl.addProtocol('gsjdem', async (params, abortController) => {
      const url = params.url.replace('gsjdem://', 'https://');
      const response = await fetch(url, { signal: abortController.signal });
      if (!response.ok) throw new Error(`GSJ DEM fetch failed: ${response.status}`);

      const bitmap = await createImageBitmap(await response.blob());
      const canvas = new OffscreenCanvas(bitmap.width, bitmap.height);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
        if ((r === 128 && g === 0 && b === 0) || a !== 255) {
          data[i] = 128; data[i + 1] = 0; data[i + 2] = 0; data[i + 3] = 255;
          continue;
        }
        const bits24 = (r << 16) | (g << 8) | b;
        const height = ((bits24 << 8) >> 8) * 0.01;
        const t = height + 32768;
        data[i]     = Math.min(255, Math.max(0, Math.floor(t / 256)));
        data[i + 1] = Math.min(255, Math.max(0, Math.floor(t % 256)));
        data[i + 2] = Math.min(255, Math.max(0, Math.floor((t % 1) * 256)));
        data[i + 3] = 255;
      }

      ctx.putImageData(imageData, 0, 0);
      const blob = await canvas.convertToBlob({ type: 'image/png' });
      return { data: await blob.arrayBuffer() };
    });


    /*
      ========================================================
      CS立体図をDEMタイルからブラウザ内で動的生成するプロトコル
      qchizu-project/qchizu-maps-maplibregljs の実装を参考に最適化
      https://github.com/qchizu-project/qchizu-maps-maplibregljs/blob/main/src/protocols/dem2CsProtocol.js

      最適化ポイント（Q地図実装より）:
        1. ガウシアンカーネルを kernelRadius 単位でキャッシュ（タイルごとの再計算を排除）
        2. ガウシアン平滑化フェーズ（手動dispose）と合成フェーズ（tf.tidy）を分離
        3. await tensor.data() で GPU→CPU 転送を非同期化（メインスレッドのブロックを回避）
        4. 9タイル全て並列fetch（中央タイルの先行fetch を廃止して待機ゼロ化）
        5. tf.where(condition, x, y) を正しい API で使用
        6. tf.browser.toPixels(tensor, canvas) でキャンバスに直接書き込み（中間配列不要）
      ========================================================
    */

    // ガウシアンカーネルキャッシュ: kernelRadius → tf.Tensor4D (kept, [kH,kW,1,1])
    // 同一ズームレベルでは kernelRadius がほぼ一定なので大幅に再計算を削減できる。
    const _csKernelCache = new Map();
    function _getCsKernel(kernelRadius, sigma) {
      if (_csKernelCache.has(kernelRadius)) return _csKernelCache.get(kernelRadius);
      const kernelDim = kernelRadius * 2 + 1;
      const kExp = tf.keep(tf.tidy(() => {
        const [kx, ky] = tf.meshgrid(
          tf.linspace(-kernelRadius, kernelRadius, kernelDim),
          tf.linspace(-kernelRadius, kernelRadius, kernelDim)
        );
        return tf.exp(tf.neg(kx.square().add(ky.square()).div(2 * sigma * sigma)))
          .expandDims(2).expandDims(3); // [kH,kW,1,1] — conv2d が要求する形状
      }));
      _csKernelCache.set(kernelRadius, kExp);
      return kExp;
    }

    // カラーランプ関数（tf.tidy 内で呼び出す）
    function _csRamp(min, max, c0, c1, t) {
      const n = t.clipByValue(min, max).sub(min).div(max - min);
      return tf.stack([
        n.mul(c1.r - c0.r).add(c0.r).round(),
        n.mul(c1.g - c0.g).add(c0.g).round(),
        n.mul(c1.b - c0.b).add(c0.b).round(),
      ], -1);
    }
    function _csRampMid(min, max, c0, c1, c2, t) {
      const n = t.clipByValue(min, max).sub(min).div(max - min);
      const half = n.lessEqual(0.5);
      const r = tf.where(half, n.mul(2).mul(c1.r - c0.r).add(c0.r), n.sub(0.5).mul(2).mul(c2.r - c1.r).add(c1.r)).round();
      const g = tf.where(half, n.mul(2).mul(c1.g - c0.g).add(c0.g), n.sub(0.5).mul(2).mul(c2.g - c1.g).add(c1.g)).round();
      const b = tf.where(half, n.mul(2).mul(c1.b - c0.b).add(c0.b), n.sub(0.5).mul(2).mul(c2.b - c1.b).add(c1.b)).round();
      return tf.stack([r, g, b], -1);
    }

    maplibregl.addProtocol('csdem', async (params, abortController) => {
      const url = params.url.replace('csdem://', 'https://');
      const m = url.match(/\/(\d+)\/(\d+)\/(\d+)\.(png|webp)$/);
      if (!m) return { data: null };
      const zoomLevel = +m[1], tileX = +m[2], tileY = +m[3], ext = m[4];
      const tileSize = 256;

      // ピクセル解像度（m/pixel）― qchizu-project/protocolUtils.calculatePixelResolution
      const L = 85.05112878;
      const py = 256 * tileY + tileSize / 2;
      const lat = (180 / Math.PI) * Math.asin(
        Math.tanh((-Math.PI / (1 << (zoomLevel + 7))) * py + Math.atanh(Math.sin(L * Math.PI / 180)))
      );
      const pixelLength = 156543.04 * Math.cos(lat * Math.PI / 180) / (1 << zoomLevel);

      // NumPNG → 標高（GSJ/Q地図形式, u=0.01m）
      const toHeight = (r, g, b, a) => {
        const x = r * 65536 + g * 256 + b;
        if (a === 0 || x === 8388608) return -99999;
        return x < 8388608 ? x * 0.01 : (x - 16777216) * 0.01;
      };

      // ガウシアンパラメータ
      const sigma = Math.min(Math.max(3 / pixelLength, 1.6), 7);
      const kernelRadius = Math.ceil(sigma * 3);
      const buffer = kernelRadius + 1;
      const mergedSize = tileSize + buffer * 2;

      // ── ① 9タイル全て並列fetch（中央タイルの先行fetchを廃止） ──
      const base = url.substring(0, url.lastIndexOf(`/${zoomLevel}/`) + 1) + `${zoomLevel}/`;
      const tileUrls = [
        base + (tileX - 1) + '/' + (tileY - 1) + '.' + ext, // 0:左上
        base +  tileX      + '/' + (tileY - 1) + '.' + ext, // 1:上
        base + (tileX + 1) + '/' + (tileY - 1) + '.' + ext, // 2:右上
        base + (tileX - 1) + '/' +  tileY      + '.' + ext, // 3:左
        url,                                                  // 4:中央
        base + (tileX + 1) + '/' +  tileY      + '.' + ext, // 5:右
        base + (tileX - 1) + '/' + (tileY + 1) + '.' + ext, // 6:左下
        base +  tileX      + '/' + (tileY + 1) + '.' + ext, // 7:下
        base + (tileX + 1) + '/' + (tileY + 1) + '.' + ext, // 8:右下
      ];

      const bitmaps = await Promise.all(tileUrls.map(async (src) => {
        try {
          const r = await fetch(src, { signal: abortController.signal });
          return r.ok ? createImageBitmap(await r.blob()) : null;
        } catch (_) { return null; }
      }));
      if (!bitmaps[4]) return { data: null }; // 中央タイルが取得できなければ終了

      // ── ② マージキャンバスに描画 ──
      const mergedCanvas = new OffscreenCanvas(mergedSize, mergedSize);
      const mc = mergedCanvas.getContext('2d');
      bitmaps.forEach((bmp, idx) => {
        if (!bmp) return;
        const col = idx % 3, row = Math.floor(idx / 3);
        let sx, sy, sw, sh, dx, dy;
        if (idx === 4) {
          sx = 0; sy = 0; sw = tileSize; sh = tileSize; dx = buffer; dy = buffer;
        } else {
          sx = col === 0 ? tileSize - buffer : 0;
          sw = col === 1 ? tileSize : buffer;
          dx = col === 2 ? tileSize + buffer : col * buffer;
          sy = row === 0 ? tileSize - buffer : 0;
          sh = row === 1 ? tileSize : buffer;
          dy = row === 2 ? tileSize + buffer : row * buffer;
        }
        mc.drawImage(bmp, sx, sy, sw, sh, dx, dy, sw, sh);
        bmp.close();
      });

      // ── ③ 標高配列生成（Float32Array — Array より高速） ──
      const mergedPx = mc.getImageData(0, 0, mergedSize, mergedSize).data;
      const mergedHeights = new Float32Array(mergedSize * mergedSize);
      for (let i = 0; i < mergedHeights.length; i++) {
        const p = i * 4;
        mergedHeights[i] = toHeight(mergedPx[p], mergedPx[p + 1], mergedPx[p + 2], mergedPx[p + 3]);
      }

      // 中央タイル（256×256）の無効値マスク — 無効ピクセルを透明にするためのアルファ値
      // mergedHeights の中央領域 (buffer,buffer)〜(buffer+256,buffer+256) を参照
      const centerAlpha = new Float32Array(tileSize * tileSize);
      for (let row = 0; row < tileSize; row++) {
        for (let col = 0; col < tileSize; col++) {
          const mi = (row + buffer) * mergedSize + (col + buffer);
          centerAlpha[row * tileSize + col] = mergedHeights[mi] === -99999 ? 0 : 255;
        }
      }

      // ── ④ ガウシアン平滑化（キャッシュ済みカーネル・手動dispose・非同期転送） ──
      // tf.tidy を使わず手動でdisposeすることで平滑化フェーズのテンソルを早期解放。
      // await tensor.data() で GPU→CPU を非同期化（dataSync() のブロックを回避）。
      const kExp = _getCsKernel(kernelRadius, sigma);
      const hT = tf.tensor2d(mergedHeights, [mergedSize, mergedSize]);
      const valid = hT.notEqual(-99999);
      const masked = tf.where(valid, hT, 0);                  // tf.where(condition, x, y) で正しくマスク
      const kSum = tf.conv2d(
        valid.cast('float32').expandDims(2).expandDims(0), kExp, 1, 'valid'
      ).squeeze([0, 3]);
      const sHRaw = tf.conv2d(
        masked.expandDims(2).expandDims(0), kExp, 1, 'valid'
      ).squeeze([0, 3]).div(kSum);
      const validCrop = valid.slice([buffer, buffer], [tileSize + 2, tileSize + 2]);
      const sH = tf.where(validCrop, sHRaw, tf.fill([tileSize + 2, tileSize + 2], -99999));
      const smoothed = await sH.data(); // 非同期 GPU→CPU 転送（メインスレッドをブロックしない）
      [masked, kSum, sHRaw, validCrop, sH].forEach(t => t.dispose());

      // ── ⑤ JS ループ: 傾斜・曲率計算 ──
      const curvatures = new Float32Array(tileSize * tileSize);
      const slopes = new Float32Array(tileSize * tileSize);
      const sw2 = tileSize + 2;
      for (let row = 0; row < tileSize; row++) {
        for (let col = 0; col < tileSize; col++) {
          const oi = row * tileSize + col;
          const mi = (row + buffer) * mergedSize + (col + buffer);
          const H00 = mergedHeights[mi], H01 = mergedHeights[mi + 1], H10 = mergedHeights[mi + mergedSize];
          const ddx = H00 - H01, ddy = H00 - H10;
          slopes[oi] = Math.atan(Math.sqrt(ddx * ddx + ddy * ddy) / pixelLength) * (180 / Math.PI);
          const si = (row + 1) * sw2 + (col + 1);
          const z2 = smoothed[si - sw2], z4 = smoothed[si - 1], z5 = smoothed[si],
                z6 = smoothed[si + 1],   z8 = smoothed[si + sw2];
          const cellArea = pixelLength * pixelLength;
          curvatures[oi] = H00 === -99999 ? -1
            : -2 * (((z4 + z6) / 2 - z5) / cellArea + ((z2 + z8) / 2 - z5) / cellArea);
        }
      }

      // ── ⑥ CS立体図 5レイヤー合成（tf.tidy で中間テンソルを自動解放） ──
      const cc = pixelLength < 68
        ? Math.max(pixelLength / 2, 1.1)
        : 0.188 * Math.pow(pixelLength, 1.232);

      const csRittaizuTensor = tf.tidy(() => {
        const hCrop = hT.slice([buffer, buffer], [tileSize, tileSize]);
        const cT = tf.tensor1d(curvatures).reshape([tileSize, tileSize]);
        const sT = tf.tensor1d(slopes).reshape([tileSize, tileSize]);
        const blend    = (a, b, alpha) => a.mul(1 - alpha).add(b.mul(alpha));
        const mulBlend = (a, b) => a.mul(b.div(255));
        const L1 = _csRamp(0, 3000, { r: 100, g: 100, b: 100 }, { r: 255, g: 255, b: 255 }, hCrop);
        const L2 = _csRamp(-0.25/cc, 0.05/cc, { r: 42, g: 92, b: 170 }, { r: 255, g: 255, b: 255 }, cT);
        const L3 = _csRamp(0, 60, { r: 255, g: 255, b: 255 }, { r: 189, g: 74, b: 29 }, sT);
        const L4 = _csRampMid(-0.2/cc, 0.2/cc, { r: 0, g: 0, b: 255 }, { r: 255, g: 255, b: 240 }, { r: 255, g: 0, b: 0 }, cT);
        const L5 = _csRamp(0, 90, { r: 255, g: 255, b: 255 }, { r: 0, g: 0, b: 0 }, sT);
        const rgb = mulBlend(blend(blend(blend(L1, L2, 0.5), L3, 0.5), L4, 0.5), L5);
        // 無効値（NoData）領域をアルファ0（透明）にするため、centerAlpha を第4チャンネルとして結合
        const alphaT = tf.tensor1d(centerAlpha, 'float32').reshape([tileSize, tileSize, 1]);
        return tf.concat([rgb, alphaT], -1); // [256,256,4] RGBA出力
      });
      [hT, valid].forEach(t => t.dispose()); // 平滑化フェーズで使い終わったテンソルを解放

      // ── ⑦ 出力: tf.browser.toPixels でキャンバスに直接書き込み（中間配列不要） ──
      const outCanvas = new OffscreenCanvas(tileSize, tileSize);
      // csRittaizuTensor は [256,256,4] RGBA。div(255) で 0–1 に正規化してそのまま渡す
      await tf.browser.toPixels(
        csRittaizuTensor.div(tf.scalar(255)), outCanvas
      );
      csRittaizuTensor.dispose();
      return { data: await outCanvas.convertToBlob({ type: 'image/png' }).then(b => b.arrayBuffer()) };
    });


    /* ========================================================
       ★ カスタマイズポイント：各種URLと初期パラメータをここで変更します
       ======================================================== */

    // ★ 標高（DEM）タイルのURL（Q地図 / 国土地理院測量成果）
    // Q地図 DEM は GSJ NumPNG と同じ変換式（x=2^16R+2^8G+B、u=0.01）のため
    // gsjdem カスタムプロトコルで Terrarium 形式に変換してから MapLibre に渡す。
    const TERRAIN_URL = 'gsjdem://mapdata.qchizu.xyz/03_dem/52_gsi/all_2025/1_02/{z}/{x}/{y}.webp';

    // ★ OriLibre（オリエンテーリング風地図）のプロジェクト設定URL
    //   isomizer がこのYAMLを読み込み、ベースマップのベクタースタイルを動的に構築する。
    //   Japan版: 国土地理院ベクタータイル + OpenFreeMap + 産総研等高線 + 農林水産省筆ポリゴン
    const ORILIBRE_PROJECT_URL = 'https://cdn.jsdelivr.net/gh/tjmsy/isomizer-projectfiles@0.3/projects/isomized-japan/project-config.yml';

    // ★ CS立体図（ブラウザ生成・Q地図DEMから動的生成）
    //   csdem:// プロトコルでQ地図DEMタイルをリアルタイムにCS立体図へ変換します。
    const CS_RELIEF_URL = 'csdem://mapdata.qchizu.xyz/03_dem/52_gsi/all_2025/1_02/{z}/{x}/{y}.webp';

    // ★ 地域別CS立体図（0.5mDEM由来・高精度）の定義リスト
    //   在る地域では全国地理院CSタイルよりも高解像度なため、上層に重ねて表示する。
    //   source id : Map内部のID、layer id : 同左 + '-layer'
    //   tileUrl   : XYZタイルURLテンプレート
    //   label     : UI表示名（ユーザー指定形式）
    //   maxzoom   : サーバー側のタイル最大ズーム（オーバーズームで引き伸ばす）
    //   attribution: 帰属表記
    // ★ 地域別CS立体図（0.5m DEM由来・高精度）の定義リスト
    //   DEM が公開されている都道府県は csdem:// プロトコルでブラウザ内生成。
    //   大阪府はDEMなし → 事前生成CSタイルをそのまま利用。
    const REGIONAL_CS_LAYERS = [
      // ── 東北 ──────────────────────────────────────────────
      {
        sourceId: 'cs-miyagi', layerId: 'cs-miyagi-layer',
        tileUrl: 'csdem://forestgeo.info/opendata/4_miyagi/dem_2023/{z}/{x}/{y}.png',
        label: 'CS立体図（0.5m）— 宮城県', maxzoom: 18,

        attribution: '<a href="https://www.geospatial.jp/ckan/dataset/tokushima_aerial_laser" target="_blank">徳島県CS：林野庁PNG標高タイルを加工して作成</a>',
      },
      {
        sourceId: 'cs-kochi', layerId: 'cs-kochi-layer',

        attribution: '<a href="https://tiles.gsj.jp/tiles/elev/tiles.html" target="_blank">高知県CS：産総研PNG標高タイルを加工して作成</a>',
      },
      {

        tileUrl: 'csdem://forestgeo.info/opendata/38_ehime/dem_2019/{z}/{x}/{y}.png',

        attribution: '<a href="https://www.geospatial.jp/ckan/dataset/rinya-ehime-maptiles" target="_blank">愛媛県CS：林野庁PNG標高タイルを加工して作成</a>',
      },
    ];

    // ★ 初期表示: 京都大学吉田キャンパス
